name: Setup Bun and install dependencies
description: >-
  Checkout + oven-sh/setup-bun + `bun install --frozen-lockfile`, the triplet
  every workflow job needs before it can run anything else. Centralizes the
  pinned bun-version (DH-0178) so it's declared in exactly one place instead
  of being hand-copied (and hand-kept-in-sync with bun.lock) across gate.yml
  and release.yml.

inputs:
  bun-version:
    description: >-
      Bun version to install. Keep in sync with the bun-types version in
      bun.lock. CLAUDE.md §2 floors the project at Bun >=1.3; bump this
      deliberately alongside that floor, not silently via a "latest" tag, so
      workflow behavior stays reproducible.
    required: false
    default: "1.3.14"
  fetch-depth:
    description: Passed through to actions/checkout's fetch-depth.
    required: false
    default: "1"
  fetch-tags:
    description: Passed through to actions/checkout's fetch-tags.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        fetch-tags: ${{ inputs.fetch-tags }}

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
