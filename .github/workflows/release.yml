name: Release

# HANDOFF.md §11 / docs/handoffs/ci-release.md scope 2: tag-driven release.
# v* tag push -> full gate -> cross-compiled binaries -> smoke test on a real runner
# of each target OS/arch -> GitHub Release (with a conventional-commits changelog) ->
# npm publish (so `bunx dark-harness` works).
#
# DH-0032: all 5 release targets used to be cross-compiled from a single
# ubuntu-latest runner with zero execution anywhere in CI — a broken cross-compile
# (wrong syscalls, path separators, bun-windows quirks) would never be caught before
# shipping, and the e2e gate (also ubuntu-only) never touched the windows/macOS
# artifacts at all. The `smoke-test` job below downloads each `build` job's actual
# artifact (the literal file that ships, not a separately-built native-host binary)
# and runs `dh --version` on a real runner of the matching OS/arch, gating `release`
# on all five passing.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Gate
    uses: ./.github/workflows/gate.yml

  build:
    name: Build (${{ matrix.target }})
    needs: gate
    runs-on: ubuntu-latest
    # Cross-compilation is done entirely from a single Linux runner: `bun build
    # --compile --target=<platform>` downloads the needed cross toolchain on demand.
    # Verified locally (bun 1.3.11) for all five targets below — no per-OS runners
    # needed, which keeps the release matrix cheap and simple.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            artifact: dh-linux-x64
          - target: bun-linux-arm64
            artifact: dh-linux-arm64
          - target: bun-darwin-x64
            artifact: dh-darwin-x64
          - target: bun-darwin-arm64
            artifact: dh-darwin-arm64
          - target: bun-windows-x64
            artifact: dh-windows-x64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile ${{ matrix.target }}
        # scripts/build.ts's arg parser only accepts "--target <value>" (space-separated,
        # two argv entries) — "--target=<value>" is silently ignored (falls back to a
        # host-arch build). Verified locally: the "=" form produced a native arm64 Mach-O
        # binary even when asked for bun-linux-x64. Do not "simplify" this back to "=".
        run: >-
          bun scripts/build.ts --target ${{ matrix.target }}
          --outfile dist/${{ matrix.artifact }}
          --release-tag "${{ github.ref_name }}"

      - name: Checksum
        working-directory: dist
        run: sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256
          if-no-files-found: error

  smoke-test:
    name: Smoke test (${{ matrix.artifact }} on ${{ matrix.runs-on }})
    needs: build
    runs-on: ${{ matrix.runs-on }}
    # One real runner per released target, matched to that target's actual OS/arch —
    # not just "any Linux box can cross-compile it." `ubuntu-24.04-arm` and
    # `macos-13` (Intel) / `macos-latest` (Apple Silicon, GitHub's default macOS
    # runner as of the images this was authored against) are GitHub-hosted labels;
    # if a future runner-image deprecation renames/retires one of these, this step
    # will fail loudly (unknown runner label) rather than silently skip — flag and
    # fix the label, don't remove the check.
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: dh-linux-x64
            binary: dh-linux-x64
            runs-on: ubuntu-latest
          - artifact: dh-linux-arm64
            binary: dh-linux-arm64
            runs-on: ubuntu-24.04-arm
          - artifact: dh-darwin-x64
            binary: dh-darwin-x64
            runs-on: macos-13
          - artifact: dh-darwin-arm64
            binary: dh-darwin-arm64
            runs-on: macos-latest
          - artifact: dh-windows-x64.exe
            binary: dh-windows-x64.exe
            runs-on: windows-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Smoke test dh --version (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x "dist/${{ matrix.binary }}"
          OUT="$(dist/${{ matrix.binary }} --version)"
          echo "dh --version -> $OUT"
          if [ -z "$OUT" ]; then
            echo "::error::dh --version produced no output on ${{ matrix.runs-on }} for ${{ matrix.artifact }}."
            exit 1
          fi

      - name: Smoke test dh --version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $out = & "dist/${{ matrix.binary }}" --version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "dh --version exited $LASTEXITCODE on ${{ matrix.runs-on }} for ${{ matrix.artifact }}."
            exit 1
          }
          Write-Host "dh --version -> $out"
          if (-not $out) {
            Write-Error "dh --version produced no output on ${{ matrix.runs-on }} for ${{ matrix.artifact }}."
            exit 1
          }

  release:
    name: Create GitHub Release
    needs: smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags: the changelog step below diffs against the previous
          # tag, which a shallow/tag-less checkout can't do.
          fetch-depth: 0
          fetch-tags: true

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts

      - name: Combine checksums
        working-directory: artifacts
        run: cat -- *.sha256 > SHA256SUMS.txt

      - name: Generate changelog
        env:
          TAG: ${{ github.ref_name }}
          REPO_URL: https://github.com/${{ github.repository }}
        shell: bash
        run: |
          # Hand-rolled conventional-commits changelog (feat/fix/docs/... grouped,
          # anything else in "Other Changes" so the notes are never empty). Chosen
          # over a third-party changelog action (e.g. git-cliff) because this domain
          # lead could actually execute and verify this exact script against the real
          # repo history in-session (see docs/handoffs/ci-release.md status log for
          # the test transcript) — an external action's default config behavior
          # could not be verified the same way without a live Actions run.
          set -euo pipefail
          PREV_TAG="$(git tag --sort=-creatordate --merged "$TAG" | grep -vFx "$TAG" | head -n1 || true)"
          if [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          {
            echo "## ${TAG}"
            echo

            LOG="$(git log --no-merges --pretty=format:'%h%x09%s' "$RANGE")"
            if [ -z "$LOG" ]; then
              echo "_No changes recorded for this range._"
            else
              echo "$LOG" | awk -F'\t' '
              BEGIN {
                n = split("feat fix perf refactor docs test build ci chore revert", order, " ");
                title["feat"]="Features"; title["fix"]="Bug Fixes"; title["perf"]="Performance";
                title["refactor"]="Refactoring"; title["docs"]="Documentation"; title["test"]="Testing";
                title["build"]="Build System"; title["ci"]="CI/CD"; title["chore"]="Chores"; title["revert"]="Reverts";
              }
              {
                hash=$1; subject=$2; matched=0;
                for (i=1;i<=n;i++) {
                  t=order[i];
                  pat="^" t "(\\([^)]*\\))?!?:[ ]*";
                  if (subject ~ pat) {
                    rest=subject;
                    sub(pat,"",rest);
                    groups[t] = groups[t] "- " rest " (" hash ")\n";
                    matched=1;
                    break;
                  }
                }
                if (!matched) other = other "- " subject " (" hash ")\n";
              }
              END {
                for (i=1;i<=n;i++) {
                  t=order[i];
                  if (groups[t] != "") {
                    print "### " title[t];
                    print "";
                    printf "%s", groups[t];
                    print "";
                  }
                }
                if (other != "") {
                  print "### Other Changes";
                  print "";
                  printf "%s", other;
                  print "";
                }
              }
              '
            fi

            if [ -n "$PREV_TAG" ]; then
              echo "**Full diff:** ${REPO_URL}/compare/${PREV_TAG}...${TAG}"
            fi
          } > CHANGELOG_RELEASE.md

          cat CHANGELOG_RELEASE.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            artifacts/dh-linux-x64 \
            artifacts/dh-linux-arm64 \
            artifacts/dh-darwin-x64 \
            artifacts/dh-darwin-arm64 \
            artifacts/dh-windows-x64.exe \
            artifacts/SHA256SUMS.txt \
            --title "${{ github.ref_name }}" \
            --notes-file CHANGELOG_RELEASE.md

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    # DH-0004: esbuild/swc-style optionalDependencies packaging — replaces the old
    # linux-x64-only single-package publish. Each of the 5 platform packages under npm/ is
    # published first (they carry only a binary + a minimal os/cpu-scoped package.json, no
    # dependency on the main package), then the main "dark-harness" package, whose
    # optionalDependencies pin all 5 by exact version. Publishing platform packages before
    # the main package means a fresh `npm install dark-harness` never briefly resolves an
    # optionalDependency version that doesn't exist on the registry yet.
    #
    # No version bump happens here: package.json's "version" (and the matching
    # optionalDependencies pins, kept in sync by scripts/generate-npm-platform-packages.ts)
    # is source-controlled, same convention the single-package flow already used — bump it
    # in a commit before tagging, this job just publishes whatever's checked in at the tag.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify npm/ platform packages are not stale
        run: bun scripts/generate-npm-platform-packages.ts --check

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-download

      - name: Stage per-platform package binaries
        run: |
          set -euo pipefail
          declare -A ARTIFACT_TO_PKG=(
            [dh-linux-x64]=dark-harness-linux-x64
            [dh-linux-arm64]=dark-harness-linux-arm64
            [dh-darwin-x64]=dark-harness-darwin-x64
            [dh-darwin-arm64]=dark-harness-darwin-arm64
            [dh-windows-x64.exe]=dark-harness-windows-x64
          )
          for artifact in "${!ARTIFACT_TO_PKG[@]}"; do
            pkg="${ARTIFACT_TO_PKG[$artifact]}"
            binary_name="dh"
            [ "$artifact" = "dh-windows-x64.exe" ] && binary_name="dh.exe"
            cp "dist-download/${artifact}/${artifact}" "npm/${pkg}/${binary_name}"
            chmod +x "npm/${pkg}/${binary_name}"
          done

      - name: Require NPM_TOKEN
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::secrets.NPM_TOKEN is not set on this repository — npm publish cannot proceed."
            echo "::error::This is an owner-authority gap: the CI/Release domain lead cannot create or set repository secrets (per its handoff constraints). An owner must add an npm automation token as the NPM_TOKEN repository secret (Settings > Secrets and variables > Actions) before this job can succeed."
            echo "::error::DH-0004: as of this release, that token must also have publish rights on the 5 new dark-harness-<platform> packages, not just the original dark-harness package."
            exit 1
          fi

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=\${NPM_TOKEN}" > .npmrc

      - name: Publish platform packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for pkg in dark-harness-linux-x64 dark-harness-linux-arm64 dark-harness-darwin-x64 dark-harness-darwin-arm64 dark-harness-windows-x64; do
            cp .npmrc "npm/${pkg}/.npmrc"
            (cd "npm/${pkg}" && npm publish --access public)
          done

      - name: Publish main package
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish
