name: Gate

# Reusable quality gate: typecheck, lint, coverage (hard 100% threshold), e2e.
# Called by ci.yml (on PRs/main) and release.yml (before cutting a release) so both
# paths run the exact same checks and can never drift apart.
#
# DH-0030: the coverage/completeness/e2e steps below used to parse `bun test
# --coverage`'s printed ANSI text table (grep + awk over an "All files" row and a
# column layout) and used a fail-open conditional for e2e ("run it if files happen
# to exist, else just print a notice"). Both were fragile: a bun version bump that
# reflows the printed table (spacing, column order, locale decimal separator) could
# silently break the coverage checks, and an accidentally-emptied `e2e/` directory
# would silently downgrade the e2e gate to a no-op instead of failing. Replaced with:
#   - coverage + completeness: `--coverage-reporter=lcov`, a structured, documented
#     format (`SF:`/`FNF:`/`FNH:`/`LF:`/`LH:` records) that bun itself produces and
#     that isn't subject to text-table reflow. Verified locally against bun 1.3.14:
#     `bun test src --coverage --coverage-reporter=lcov` writes `coverage/lcov.info`;
#     totals are summed with awk directly from those records, and the completeness
#     check diffs the `SF:` file list (not a printed table's path column) against
#     `git ls-files`.
#   - e2e: fails closed. Once `e2e/` contains at least one test file (true today —
#     see `e2e/*.test.ts`), an empty/missing `e2e/` is treated as a hard failure, not
#     a notice. This is a one-way ratchet, matching HANDOFF.md/docs/handoffs/ci-release.md's
#     framing that e2e is "sequenced after the other domains land" — now that it has
#     landed, its absence is a regression, not an expected bootstrap state.
#
# `test:coverage` still doesn't fail below 100% on its own — bun's own hard-threshold
# mechanism is a `bunfig.toml` `coverageThreshold` entry, a repo-root file outside this
# domain's ownership (.github/workflows/, per CLAUDE.md §3), so this workflow continues
# to enforce the threshold itself rather than adding that file unilaterally. See
# docs/handoffs/ci-release.md status log for that alternative and why it was left as a
# request rather than a silent edit.
#
# Separately flagged (not fixed here, outside this domain): CLAUDE.md §5 describes the
# coverage gate as applying to "new/changed code," but this step (inherited from round 1,
# unchanged in that respect) enforces 100% for the whole tree, always — CLAUDE.md is
# coordinator-owned law, not `.github/workflows/`, so reconciling the wording is a
# coordinator call, not something this domain edits unilaterally. Recorded in
# docs/handoffs/ci-release.md.
on:
  workflow_call:

jobs:
  gate:
    name: typecheck / lint / coverage / e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # DH-0178: centralizes Bun setup + install (not checkout -- see the action's
      # own doc comment for why checkout has to stay a separate step here).
      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-bun-and-install

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      # DH-0164: e2e's PTY-based TUI tests (e2e/support/tmux-pty.ts) depend on a real `tmux`
      # binary and it was never installed here either -- same masked-gap pattern as the
      # Chromium install above. "no server running"/"can't find pane" every single time,
      # not intermittently, is consistent with tmux being absent or broken, not merely slow.
      - name: Install tmux
        run: sudo apt-get install -y tmux

      # DH-0164: e2e/spikes/web/support.ts's resolveChromiumExecutable() has no fallback that
      # works on a fresh runner (it checks a few conventional cache paths, none of which exist
      # until something actually downloads a browser) -- this step was always missing, just
      # masked by the gate consistently failing on an earlier step first.
      #
      # DH-0165: originally landed as a bare `install chromium` (no --with-deps) because a
      # first attempt with --with-deps correlated with the PTY/tmux-based TUI e2e tests timing
      # out. That correlation turned out to be a false lead -- the real tmux root cause was an
      # unrelated Ink `isInCi` rendering bug, fixed separately, and tmux e2e is now confirmed
      # green in real CI on its own. With that misattribution cleared, --with-deps is back in:
      # bare `install chromium` only downloads the browser binary, not the system libraries
      # (libdbus-1-3, libatspi2.0-0, etc.) it needs at runtime. Their absence is why headless
      # Chromium logged "Failed to connect to the bus" (dbus/bus.cc) on every launch and then
      # never painted the page, timing out every `waitForSelector`/`waitForFunction` in
      # web.test.ts, streaming.test.ts, and connect-web.test.ts.
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      # DH-0149: the shared-process `bun test src --coverage --parallel=1 ...`
      # invocation above (see git history) let module-load-order state bleed
      # between unrelated test files, which is what produced the
      # "Cannot access 'Yoga' before initialization" Ink/yoga-layout crash
      # (DH-0145/DH-0146). Replaced with scripts/test-isolated.ts, which spawns
      # every src/**/*.test.ts(x) file as its own `bun test` OS process (no
      # shared module graph across files) and merges each process's own
      # `lcov.info` into one coverage/lcov.info via the standard `lcov` CLI.
      - name: Test with coverage gate (100% required)
        shell: bash
        # DH-0149 follow-up: capping concurrency below the runner's reported core count is
        # a live experiment — a first CI run at the default (os.cpus().length, uncapped) hit
        # several real-timeout-boundary tests (e.g. src/agent/mcp/connection.test.ts's
        # per-call-timeout test) racing against CPU contention from many concurrent `bun
        # test` processes, not the DH-0145/DH-0146 Yoga crash this ticket set out to fix
        # (confirmed absent in that same run). Lowering this is the cheap thing to rule out
        # before assuming those are real test-design bugs.
        env:
          TEST_ISOLATED_CONCURRENCY: "2"
        run: |
          set -o pipefail
          bun run test:coverage 2>&1 | tee coverage-report.txt
          TEST_EXIT="${PIPESTATUS[0]}"
          if [ "$TEST_EXIT" -ne 0 ]; then
            echo "::error::bun run test:coverage failed (exit $TEST_EXIT) — see log above."
            exit "$TEST_EXIT"
          fi

          if [ ! -f coverage/lcov.info ]; then
            echo "::error::coverage/lcov.info was not produced — treating as a gate failure rather than a silent pass."
            exit 1
          fi

          # Sum LH/LF (lines hit/found) across every SF: record in the merged
          # lcov file, then compute the percentage ourselves — a structured
          # sum, not a string comparison against a formatted percentage.
          #
          # DH-0149: the former FNH/FNF (functions hit/found) branch is
          # dropped here. Function data is no longer present in the merged
          # file: Bun's per-process lcov output only emits summary FNF:/FNH:
          # records with no per-function FN:/FNDA: coverpoints, so `lcov
          # --ignore-errors empty` correctly drops function data as
          # non-mergeable rather than approximating it. This is not a loss of
          # signal at this gate's 100% threshold — Bun marks a function "hit"
          # via its definition line executing, so 100% line coverage already
          # implies 100% function coverage in Bun's own instrumentation model.
          read -r LH LF <<EOF
          $(awk -F: '
            /^LH:/  { lh  += $2 }
            /^LF:/  { lf  += $2 }
            END { print lh, lf }
          ' coverage/lcov.info)
          EOF

          if [ "$LF" -eq 0 ]; then
            echo "::error::lcov report has zero total lines (LF=$LF) — coverage/lcov.info looks empty or malformed."
            exit 1
          fi

          LINES_PCT="$(awk -v h="$LH" -v f="$LF" 'BEGIN { printf "%.2f", (h/f)*100 }')"
          echo "Coverage: lines=${LINES_PCT}% (${LH}/${LF})"

          if [ "$LINES_PCT" != "100.00" ]; then
            echo "::error::Coverage gate failed — CLAUDE.md §5 requires 100% line coverage. Got lines=${LINES_PCT}%25."
            exit 1
          fi

      - name: Coverage completeness (every src file must be exercised by a test)
        shell: bash
        run: |
          # Bun's own docs are explicit: "Coverage only tracks files that are
          # loaded" — a src file that no test imports (directly or transitively)
          # is silently OMITTED from the report rather than shown at 0%, so the
          # 100%-threshold step above would report "100.00%" even with completely
          # untested files sitting in src/. This step closes that gap by diffing the
          # set of files lcov's `SF:` records actually list (structured, not a
          # printed-table path column) against every real source file, and
          # hard-failing on anything missing — so "100% coverage is a gate, not a
          # target" (CLAUDE.md §5) holds for the whole tree, not just the subset some
          # test happens to import.
          set -euo pipefail
          REPORTED_FILES="$(grep '^SF:' coverage/lcov.info | sed 's/^SF://' | sort -u)"

          # DH-0151: *.type.ts / *.constant.ts files (a future wave-based
          # migration will rename existing type-only/constant-only files to
          # these suffixes) are deliberately excluded from the merged lcov
          # output by scripts/test-isolated.ts's mergeLcov — mirror that
          # exclusion here so this check doesn't flag them as "missing" once
          # they stop appearing as SF: records. None exist yet.
          ALL_SRC="$(git ls-files 'src/*.ts' 'src/**/*.ts' 'src/*.tsx' 'src/**/*.tsx' 2>/dev/null \
            | grep -vE '\.(test|spec)\.(ts|tsx)$' \
            | grep -vE '\.d\.ts$' \
            | grep -vE '\.(type|constant)\.ts$' \
            | sort -u)"

          MISSING="$(comm -23 <(echo "$ALL_SRC") <(echo "$REPORTED_FILES") | sed '/^$/d')"

          if [ -n "$MISSING" ]; then
            echo "::error::The following src files are never loaded by any test, so bun's coverage report doesn't even see them (and the 100%25 threshold check above can't catch them). Add a test that imports each one (directly, or transitively via a barrel file), even a minimal smoke test:"
            echo "$MISSING" | while read -r f; do echo "::error::  - $f"; done
            exit 1
          fi

          echo "All src files are exercised by at least one test."

      - name: E2E test-file count (fails closed if e2e/ has no tests)
        shell: bash
        run: |
          # DH-0030: this used to auto-detect e2e test files and downgrade to a
          # `::notice` (not a failure) if none were found — reasonable while e2e/ was
          # still being built out (HANDOFF.md §10: sequenced after other domains
          # land), but fails *open*: if a future change accidentally emptied e2e/ of
          # test files, this step would silently stop being a gate instead of
          # failing. Now that e2e/ is populated (see e2e/*.test.ts), this step fails
          # closed instead: zero e2e test files is a hard failure, not a notice.
          E2E_TEST_COUNT="$(find e2e -type f \( -name "*.test.ts" -o -name "*.spec.ts" -o -name "*_test_*.ts" -o -name "*_spec_*.ts" \) 2>/dev/null | wc -l | tr -d ' ')"
          echo "Found $E2E_TEST_COUNT e2e test file(s) under e2e/."
          if [ "$E2E_TEST_COUNT" -eq 0 ]; then
            echo "::error::No e2e test files found under e2e/ — this is a hard gate failure, not a bootstrap notice, now that the E2E domain has landed test files. If e2e/ was intentionally emptied, that decision needs sign-off (CLAUDE.md §6), not a silent gate downgrade."
            exit 1
          fi

      # DH-0164: split by resource profile rather than one `bun run e2e` step. Chromium
      # (web.test.ts/connect-web.test.ts/streaming.test.ts) and real tmux+PTY sessions
      # (tui.test.ts/slash-commands.test.ts/markdown-rendering.test.ts) coexisting in one
      # process tree exhausted the runner badly enough that the tmux SERVER itself died mid-run
      # ("no server running" — not just a slow individual wait) once both kinds of e2e test
      # actually got to execute against real CI for the first time. Structural fix: never let
      # both resource-heavy categories share a job step's process tree at the same time.
      - name: E2E (core/protocol — no browser or PTY)
        run: bun test e2e/bedrock-provider.test.ts e2e/build-stamp.test.ts e2e/exit-codes.test.ts e2e/security.test.ts e2e/server-protocol.test.ts --parallel=1

      - name: E2E (TUI/PTY — tmux)
        run: bun test e2e/tui.test.ts e2e/slash-commands.test.ts e2e/markdown-rendering.test.ts --parallel=1

      - name: E2E (web/browser — Chromium)
        run: bun test e2e/web.test.ts e2e/streaming.test.ts --parallel=1

      # DH-0165: split out from the step above — connect-web.test.ts is the heaviest single
      # e2e scenario in the whole suite (two real `dh` processes, a `--server` plus a
      # `--connect --web` client, on top of its own Chromium launch) and consistently hung/
      # timed out in real CI (even at a 90s budget, with zero page console/network/DOM
      # diagnostic output ever printed — see the test's own DH-0165 comments) specifically
      # when run third, right after web.test.ts's and streaming.test.ts's own Chromium
      # sessions in the same process tree. Same structural fix DH-0164 already established
      # for the tmux/PTY step just above: never let more resource-heavy work pile up in one
      # job step's process tree than it needs to.
      - name: E2E (web/browser — connect --web, isolated)
        run: bun test e2e/connect-web.test.ts
